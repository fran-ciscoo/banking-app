services:
  postgres:
    image: postgres:16
    container_name: banking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    container_name: banking_tigerbeetle
    user: root
    privileged: true
    ports:
      - "3000:3000"
    volumes:
      - tigerbeetle_data:/data
    entrypoint: >
      sh -c "
        if [ ! -f /data/0_0.tigerbeetle ]; then
          /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle;
        fi &&
        /tigerbeetle start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
      "

  mcp-server:
    build: ./mcp-server
    container_name: banking_mcp_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/banking?sslmode=disable
    ports:
      - "9090:9090"

  backend:
    build: ./backend
    container_name: banking_backend
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:password@postgres:5432/banking?sslmode=disable
      JWT_SECRET: mi-secreto-super-seguro-2024
      TIGERBEETLE_ADDR: tigerbeetle:3000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MCP_SERVER_URL: http://mcp-server:9090
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: banking_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  tigerbeetle_data: